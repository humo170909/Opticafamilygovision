<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirigiendo · Óptica Family GO Vision </title>
  <script>
    // GitHub Pages SPA redirect: conserva la ruta y redirige al index
    const path = window.location.pathname;
    const search = window.location.search;
    const hash = window.location.hash;
    // Determinar base del repositorio (para subdirectorio en GitHub Pages)
    const repo = path.split('/')[1];
    const base = repo && !repo.includes('.') ? '/' + repo + '/' : '/';
    window.location.replace(
      window.location.origin + base + '?redirect=' + encodeURIComponent(path + search + hash)
    );
  </script>
</head>
<body>
  <p style="font-family:system-ui;padding:40px;color:#355472;">Redirigiendo…</p>
</body>
</html>
