<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Óptica Family GO Vision — Cargando </title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f2a44;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; font-family: 'Inter', system-ui, sans-serif; color: #fff;
    }
    .loader { text-align: center; }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid rgba(255,255,255,.18);
      border-top-color: #4a90d9;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: .85rem; opacity: .65; letter-spacing: .02em; }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Cargando sistema…</p>
  </div>

  <script type="module">
    import { supabase, APP_ROOT, TABLAS } from './js/config/supabase.js';
    try {
      const { data: { session } } = await supabase.auth.getSession();
      const motivo = new URLSearchParams(window.location.search).get('motivo');
      if (!session) {
        window.location.replace(
          APP_ROOT + 'views/auth/login.html' + (motivo ? '?motivo=' + motivo : '')
        );
      } else {
        const { data: perfil } = await supabase
          .from(TABLAS.USUARIOS)
          .select('rol')
          .eq('id', session.user.id)
          .single();
        const rol = perfil?.rol;
        window.location.replace(
          rol === 'vendedor'
            ? APP_ROOT + 'views/ventas/dashboard-vendedor.html'
            : APP_ROOT + 'views/dashboard.html'
        );
      }
    } catch {
      window.location.replace('./views/auth/login.html');
    }
  </script>
</body>
</html>
