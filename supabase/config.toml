# supabase/config.toml
# Configuración del proyecto Supabase para Óptica Family GO Vision
# Referencia de proyecto: vrscebxtqvzxspexlfdc
#
# Documentación: https://supabase.com/docs/guides/functions/deploy

project_id = "optica-gofamilia"

# ── Edge Functions ─────────────────────────────────────────────────────────────
# verify_jwt = false  →  El gateway de Supabase NO intercepta el preflight OPTIONS.
# Sin este flag, las peticiones OPTIONS (sin Authorization) reciben 401 antes de
# que el código de la función corra, causando el error CORS en el navegador.
# Cada función verifica el JWT manualmente en su propio código para peticiones POST.

[functions.send-whatsapp]
verify_jwt = false

[functions.manage-user]
verify_jwt = false
